<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TITOLO_GIOCO – Bubble Arcade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="../../favicon.svg">
  <link rel="stylesheet" href="../../css/design-system.css">
  <style>
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; }

    /* ── Game Nav ── */
    .game-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: .75rem 2rem;
      background: rgba(252,244,255,.85); backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 50;
      border-bottom: 1px solid rgba(186,164,211,.25);
    }
    .score-display { text-align: right; }
    .score-label { font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--on-surface-v); display: block; }
    .score-value { font-size: 1.4rem; font-weight: 800; letter-spacing: -.02em; color: var(--on-bg); }

    /* ── Layout ── */
    .game-layout {
      flex: 1; display: grid;
      grid-template-columns: 220px auto 220px;
      gap: 2rem; align-items: start;
      padding: 2rem; max-width: 960px; margin: 0 auto; width: 100%;
    }

    /* ── Sidebar ── */
    .sidebar h2 { font-size: 1.3rem; font-weight: 800; letter-spacing: -.02em; margin-bottom: .5rem; color: var(--on-bg); }
    .sidebar p  { font-size: .85rem; line-height: 1.6; color: var(--on-surface-v); margin-bottom: 1.5rem; }
    .info-box, .leaderboard-box {
      background: var(--surface-lo); border-radius: 1.2rem; padding: 1rem 1.2rem; margin-bottom: 1rem;
    }
    .info-box h3, .leaderboard-box h3 {
      font-size: .72rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: .06em; margin-bottom: .75rem; color: var(--on-bg);
    }
    .controls-list { list-style: none; display: flex; flex-direction: column; gap: .4rem; }
    .controls-list li { font-size: .82rem; color: var(--on-surface-v); }
    .controls-list kbd {
      background: var(--surface-chh); border-radius: .4rem; padding: .1rem .4rem;
      font-size: .72rem; font-weight: 700; font-family: monospace; color: var(--on-bg);
    }
    #leaderboardList { list-style: none; display: flex; flex-direction: column; gap: .4rem; }
    #leaderboardList li { display: flex; justify-content: space-between; font-size: .82rem; }
    .lb-rank  { color: var(--on-surface-v); min-width: 24px; }
    .lb-name  { color: var(--on-surface); flex: 1; padding: 0 .4rem; }
    .lb-score { font-weight: 700; color: var(--primary); }
    .lb-empty { color: var(--on-surface-v); font-style: italic; }

    /* ── Canvas area ── */
    .game-center { display: flex; justify-content: center; }
    .canvas-wrap {
      position: relative; border-radius: 1.5rem; overflow: hidden;
      box-shadow: var(--shadow-ambi);
    }
    #gameCanvas { display: block; }

    /* ── Overlays ── */
    .overlay {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      background: rgba(252,244,255,.92); backdrop-filter: blur(8px); z-index: 10;
    }
    .overlay-card {
      background: var(--surface-0); border-radius: 2rem; padding: 2.5rem 3rem;
      text-align: center; box-shadow: var(--shadow-ambi);
      display: flex; flex-direction: column; align-items: center; gap: 1rem;
      min-width: 240px;
    }
    .overlay-title { font-size: 1.8rem; font-weight: 800; letter-spacing: -.02em; color: var(--on-bg); }
    .overlay-sub   { font-size: .9rem; color: var(--on-surface-v); margin-top: -.3rem; }
    .overlay-score-big { font-size: 3rem; font-weight: 800; color: var(--primary); letter-spacing: -.03em; line-height: 1; }
    .high-score-badge {
      background: var(--tertiary-c); color: var(--on-tertiary-c);
      font-size: .72rem; font-weight: 800; text-transform: uppercase; letter-spacing: .06em;
      padding: .3rem .8rem; border-radius: 999px;
    }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      .game-layout { grid-template-columns: 1fr; padding: 1rem; }
      .sidebar { display: none; }
    }
  </style>
</head>
<body>

  <nav class="game-nav">
    <a href="../../index.html" class="btn-ghost-arrow"><span class="arrow">←</span> Indietro</a>
    <a href="../../index.html" class="logo"><span class="logo-dot"></span>Bubble Arcade</a>
    <div class="score-display">
      <span class="score-label">Punteggio</span>
      <span class="score-value" id="scoreDisplay">0</span>
    </div>
  </nav>

  <div class="game-layout">
    <aside class="sidebar">
      <h2>TITOLO_GIOCO</h2>
      <p>DESCRIZIONE_GIOCO</p>
      <div class="info-box">
        <h3>🎮 Controlli</h3>
        <ul class="controls-list" id="controlsList">
          <!-- Popolato per ogni gioco -->
        </ul>
      </div>
    </aside>

    <div class="game-center">
      <div class="canvas-wrap">
        <canvas id="gameCanvas"></canvas>

        <!-- Overlay Inizio -->
        <div class="overlay" id="overlayIdle">
          <div class="overlay-card">
            <div class="overlay-title">TITOLO_GIOCO</div>
            <div class="overlay-sub">TAGLINE_GIOCO</div>
            <button class="btn-primary" id="btnStart">Inizia</button>
          </div>
        </div>

        <!-- Overlay Game Over -->
        <div class="overlay hidden" id="overlayGameover">
          <div class="overlay-card">
            <div class="overlay-title">Game Over</div>
            <div class="overlay-score-big" id="finalScore">0</div>
            <div class="high-score-badge hidden" id="newHighScoreBadge">🏆 Nuovo Record!</div>
            <button class="btn-primary" id="btnRestart">Rigioca</button>
            <a href="../../index.html" class="btn-ghost-arrow" style="margin-top:.25rem">← Portale <span class="arrow"></span></a>
          </div>
        </div>
      </div>
    </div>

    <aside class="sidebar">
      <div class="leaderboard-box">
        <h3>🏆 Migliori Punteggi</h3>
        <ol id="leaderboardList"></ol>
      </div>
    </aside>
  </div>

  <script src="../../js/engine.js"></script>
  <script src="../../js/sprites.js"></script>
  <script src="../../shared/scores.js"></script>
  <script>
    const GAME_ID = 'GAME_ID_HERE';
    const scoreEl       = document.getElementById('scoreDisplay');
    const overlayIdle   = document.getElementById('overlayIdle');
    const overlayGO     = document.getElementById('overlayGameover');
    const finalScoreEl  = document.getElementById('finalScore');
    const hsBadge       = document.getElementById('newHighScoreBadge');

    const canvas = document.getElementById('gameCanvas');
    BubbleEngine.init(canvas, { width: 480, height: 640 });
    BubbleScores.renderList(GAME_ID, document.getElementById('leaderboardList'));

    // ── LOGICA DI GIOCO QUI ──

    function showGameOver(score) {
      BubbleEngine.loop.stop();
      const isHS = BubbleScores.isHighScore(GAME_ID, score);
      BubbleScores.save(GAME_ID, score);
      BubbleScores.renderList(GAME_ID, document.getElementById('leaderboardList'));
      finalScoreEl.textContent = score.toLocaleString('it-IT');
      hsBadge.classList.toggle('hidden', !isHS);
      overlayGO.classList.remove('hidden');
    }

    document.getElementById('btnStart').addEventListener('click', () => {
      overlayIdle.classList.add('hidden');
      Game.reset();
      Game.state = 'playing';
      BubbleEngine.setCallbacks(dt => Game.update(dt), ctx => Game.render(ctx));
      BubbleEngine.loop.start();
    });

    document.getElementById('btnRestart').addEventListener('click', () => {
      overlayGO.classList.add('hidden');
      Game.reset();
      Game.state = 'playing';
      BubbleEngine.loop.start();
    });
  </script>
</body>
</html>
