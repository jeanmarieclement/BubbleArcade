<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8005a"/>
      <stop offset="100%" stop-color="#7a0038"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="9" fill="url(#bg)"/>
  <!-- Joystick base -->
  <rect x="7" y="22" width="18" height="5" rx="2.5" fill="white" opacity="0.92"/>
  <!-- Stick -->
  <rect x="14" y="12" width="4" height="11" rx="2" fill="white" opacity="0.92"/>
  <!-- Ball -->
  <circle cx="16" cy="10" r="4.5" fill="#26e6ff"/>
  <!-- Ball gloss -->
  <circle cx="14.5" cy="8.5" r="1.5" fill="white" opacity="0.45"/>
</svg>
